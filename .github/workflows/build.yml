name: Build MeshAgent EXE

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install MSYS2
      uses: msys2/setup-msys2@v2
      with:
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          make

    - name: Build MeshAgent
      shell: msys2 {0}
      run: make

    - name: Upload meshagent.exe
      uses: actions/upload-artifact@v4
      with:
        name: meshagent-exe
        path: meshagent.exe
