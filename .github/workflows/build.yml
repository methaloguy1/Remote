name: Build MeshAgent EXE

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Build MeshAgent
      run: msbuild MeshAgent-2022.sln /p:Configuration=Release /p:Platform=x64

    - name: Upload meshagent.exe
      uses: actions/upload-artifact@v4
      with:
        name: meshagent-exe
        path: x64/Release/meshagent.exe
